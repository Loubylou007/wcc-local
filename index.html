<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --green:#0F6E56;--green-l:#E1F5EE;--green-d:#085041;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;
  --purple:#3C3489;--purple-l:#EEEDFE;
  --bg:#f5f5f4;--bg2:#eae9e6;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9ca3af;
  --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.2);
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid var(--bdr);padding:0 14px;display:flex;align-items:center;height:48px;flex-shrink:0;gap:8px}
.topbar-title{font-size:15px;font-weight:600;flex:1;display:flex;align-items:center;gap:7px}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc}
.sdot.ok{background:#10B981}.sdot.busy{background:#F59E0B}.sdot.err{background:#EF4444}
.date-badge{font-size:11px;color:var(--text2);background:var(--bg);padding:3px 8px;border-radius:var(--r)}
.stats{background:#fff;border-bottom:0.5px solid var(--bdr);padding:8px 14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;flex-shrink:0}
.stat{background:var(--bg);border-radius:var(--r);padding:7px 9px}
.sl{font-size:10px;color:var(--text2);margin-bottom:1px}
.sv{font-size:17px;font-weight:600}
.sv.bl{color:var(--blue)}.sv.gn{color:var(--green)}.sv.am{color:var(--amber)}.sv.rd{color:var(--red)}
.tabs{display:flex;background:#fff;border-bottom:0.5px solid var(--bdr);flex-shrink:0}
.tab{flex:1;padding:10px 4px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.on{color:var(--blue);border-bottom:2px solid var(--blue)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:340px;min-width:260px;background:#fff;border-right:0.5px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sb-body{flex:1;overflow-y:auto;padding:12px}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
.map-btn{position:absolute;bottom:16px;right:10px;z-index:999;background:#fff;border:0.5px solid var(--bdr2);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.map-legend{position:absolute;bottom:52px;left:10px;z-index:1000;background:#fff;border-radius:var(--rl);padding:10px;border:0.5px solid var(--bdr);font-size:11px;max-width:160px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.ml-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.ml-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* FORMS */
.fg{margin-bottom:9px}
.fl{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.3px}
.fi{width:100%;padding:7px 9px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r);background:#fff;color:var(--text);font-family:inherit;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.15)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:52px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fa{display:flex;gap:8px;margin-top:10px}
.btn{padding:8px 13px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:0.5px solid var(--bdr2);background:#fff;color:var(--text);font-family:inherit;-webkit-appearance:none}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:var(--blue-d)}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}
.btn-sm{padding:4px 9px;font-size:11px}
.freq-hint{font-size:10px;color:var(--blue);margin-top:3px;min-height:12px}

/* ALERTS */
.alert{border-radius:var(--rl);padding:10px 12px;margin-bottom:10px}
.alert-amber{background:var(--amber-l);border:0.5px solid #EF9F27}
.alert-blue{background:var(--blue-l);border:0.5px solid var(--blue)}
.alert-green{background:var(--green-l);border:0.5px solid var(--green)}
.alert-title{font-size:12px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.alert-amber .alert-title{color:var(--amber)}
.alert-blue .alert-title{color:var(--blue-d)}
.alert-green .alert-title{color:var(--green-d)}
.alert-body{font-size:12px}
.alert-amber .alert-body{color:#633806}
.alert-blue .alert-body{color:var(--blue-d)}
.alert-green .alert-body{color:var(--green-d)}
.alert-link{font-size:11px;font-weight:600;text-decoration:underline;cursor:pointer;margin-top:5px;display:inline-block}
.alert-amber .alert-link{color:var(--amber)}

/* ROUND PROGRESS */
.round-card{background:#fff;border-radius:var(--rl);border:0.5px solid var(--bdr);margin-bottom:8px;overflow:hidden}
.rc-hdr{padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.rc-name{font-size:13px;font-weight:600;flex:1}
.rc-val{font-size:12px;font-weight:600}
.rc-bar-wrap{height:5px;background:var(--bg2);margin:0 12px 8px;border-radius:3px;overflow:hidden}
.rc-bar{height:5px;border-radius:3px;transition:width .4s}
.rc-detail{padding:0 12px 8px;font-size:11px;color:var(--text2)}

/* JOB CARDS */
.job-list{display:flex;flex-direction:column;gap:7px}
.jc{background:var(--bg);border-radius:var(--r);padding:9px 11px;cursor:pointer;border:0.5px solid var(--bdr)}
.jc:hover{border-color:var(--bdr2)}
.jc.sel{border-color:var(--blue);background:var(--blue-l)}
.jc-n{font-size:13px;font-weight:600;margin-bottom:1px}
.jc-a{font-size:11px;color:var(--text2);margin-bottom:4px}
.jc-m{display:flex;gap:5px;flex-wrap:wrap}
.b{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600}
.b-f{background:var(--green-l);color:var(--green-d)}
.b-p{background:var(--blue-l);color:var(--blue-d)}
.b-a{background:var(--amber-l);color:var(--amber)}
.b-t{background:var(--amber-l);color:var(--amber)}
.b-c{background:var(--purple-l);color:var(--purple)}
.b-r{background:var(--blue-l);color:var(--blue-d);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* STREET ITEMS */
.street-item{padding:8px 10px;border-radius:var(--r);margin-bottom:6px;cursor:pointer;border:0.5px solid var(--bdr)}
.street-item.has-cust{border-color:var(--green);background:var(--green-l)}
.street-item.partial{border-color:#EF9F27;background:var(--amber-l)}
.street-item.fresh{border-color:var(--blue);background:var(--blue-l)}
.si-n{font-size:12px;font-weight:600}
.si-s{font-size:11px;color:var(--text2);margin-top:1px}

.sec-lbl{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.setup-box{background:var(--blue-l);border:0.5px solid var(--blue);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.setup-box p{font-size:13px;color:var(--blue-d);margin-bottom:7px;font-weight:500}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:var(--r);font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
@media(max-width:640px){.main{flex-direction:column}.sidebar{width:100%;height:55%;border-right:none;border-bottom:0.5px solid var(--bdr)}.stats{grid-template-columns:repeat(2,1fr)}.sv{font-size:14px}}
</style>
</head>

// ── Load
async function loadData(){
  setSS('busy');
  try{
    const[jr,rr]=await Promise.all([
      sb.from('jobs').select('*').order('created_at',{ascending:false}),
      sb.from('rounds').select('*').order('name')
    ]);
    if(jr.error)throw jr.error;
    jobs=jr.data||[];
    aRC(rr.data||[]);
    setSS('ok');updateStats();renderTab();renderMarkers();buildLegend();
  }catch(e){setSS('err');toast('Connection error','err');}
}

sb.channel('jobs-live').on('postgres_changes',{event:'*',schema:'public',table:'jobs'},p=>{
  if(p.eventType==='INSERT') jobs.unshift(p.new);
  else if(p.eventType==='UPDATE'){const i=jobs.findIndex(x=>x.id===p.new.id);if(i>=0)jobs[i]=p.new;else jobs.unshift(p.new);}
  else if(p.eventType==='DELETE') jobs=jobs.filter(x=>x.id!==p.old.id);
  updateStats();renderTab();renderMarkers();
}).subscribe();

function updateStats(){
  const tj=jobs.filter(j=>j.date_added===todayStr);
  const tv=tj.reduce((s,j)=>s+(parseFloat(j.price)||0),0);
  document.getElementById('s1').textContent=tj.length;
  document.getElementById('s2').textContent='£'+tv.toFixed(2);
  document.getElementById('s3').textContent='£'+jobs.reduce((s,j)=>s+monVal(j.price,j.frequency),0).toFixed(0);
  document.getElementById('s4').textContent='£'+jobs.reduce((s,j)=>s+annVal(j.price,j.frequency),0).toFixed(0);
}

function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');renderTab();
}
function renderTab(){
  const c=document.getElementById('tc');
  if(curTab==='add') renderAdd(c);
  else if(curTab==='canvass') renderCanvass(c);
  else if(curTab==='rounds') renderRounds(c);
  else renderList(c);
}

  const first=n.split(' ')[0];
  return TERRITORIES[first]||TERRITORIES[n]||null;
}

// ── HELPER: get live round values from DB jobs
function getLiveRoundData(rounds){
  const out={};
  rounds.forEach(name=>{
    const rj=jobs.filter(j=>j.round_name===name);
    const daily=rj.reduce((s,j)=>s+(parseFloat(j.price)||0),0);
    const stored=ROUND_DATA[name]||{daily:0,jobs:0};
    out[name]={
      daily:rj.length>0?daily:stored.daily,
      count:rj.length>0?rj.length:stored.jobs,
      pct:Math.min(200,((rj.length>0?daily:stored.daily)/TARGET)*100)
    };
  });
  return out;
}

// ── HELPER: get priority (nearest to £450 but not full)
function getPriority(liveData){
  return Object.entries(liveData)
    .filter(([n,d])=>d.daily<TARGET)
    .sort((a,b)=>b[1].daily-a[1].daily)[0];
}

// ── HELPER: next round number
function nextNum(name){
  const base=name.replace(/\s*\d+$/, '').trim();
  const existing=Object.keys(ROUND_DATA).filter(r=>r.startsWith(base));
  const nums=existing.map(r=>{const m=r.match(/(\d+)$/);return m?parseInt(m[1]):1;});
  return Math.max(...nums,1)+1;
}

// ── ROUNDS TAB
function renderRounds(c){
  const terr=getTerr();
  if(!terr){c.innerHTML=setupBox();return;}
  const live=getLiveRoundData(terr.rounds);
  const priority=getPriority(live);

  let html=`<div class="alert alert-amber">
    <div class="alert-title">🎯 ${terr.label} — canvassing priorities</div>
    <div class="alert-body">${getPriorityMsg(live,priority)}</div>
    <span class="alert-link" onclick="switchTab('canvass',document.querySelectorAll('.tab')[1])">→ Open smart canvass map</span>
  </div>`;

  // Sort: nearly full → building → starting → full (split needed)
  const sorted=terr.rounds.map(name=>({name,...live[name]}))
    .sort((a,b)=>{
      if(a.daily>=TARGET&&b.daily<TARGET) return 1;
      if(b.daily>=TARGET&&a.daily<TARGET) return -1;
      return b.daily-a.daily;
    });

  sorted.forEach(r=>{
    const full=r.daily>=TARGET;
    const nearly=r.daily>=TARGET*0.85&&!full;
    const col=full?'#10B981':nearly?'#F59E0B':'#185FA5';
    const gap=Math.max(0,TARGET-r.daily);
    const needed=Math.ceil(gap/15);
    html+=`<div class="round-card">
      <div class="rc-hdr" onclick="focusRound('${r.name}')">
        <div style="width:10px;height:10px;border-radius:50%;background:${rc(r.name)};flex-shrink:0"></div>
        <div class="rc-name">${r.name}</div>
        <div class="rc-val" style="color:${col}">£${r.daily.toFixed(0)}/day</div>
      </div>
      <div class="rc-bar-wrap"><div class="rc-bar" style="width:${Math.min(100,r.pct)}%;background:${col}"></div></div>
      <div class="rc-detail">
        ${r.count} jobs · ${r.pct.toFixed(0)}% of £${TARGET} target ·
        ${full?`✅ FULL — start <b>${r.name} ${nextNum(r.name)}</b>`:
          nearly?`⚡ Nearly full — ${needed} more job${needed!==1?'s':''} needed`:
          `needs £${gap.toFixed(0)} more (~${needed} jobs)`}
      </div>
    </div>`;
  });

  c.innerHTML=html;
}

function getPriorityMsg(live,priority){
  const full=Object.entries(live).filter(([n,d])=>d.daily>=TARGET).map(([n])=>n);
  if(full.length){
    const splits=full.map(n=>`${n} ${nextNum(n)}`).join(', ');
    return `${full.join(', ')} ${full.length>1?'are':'is'} full! Create: <b>${splits}</b>. ${priority?`Focus canvassing on <b>${priority[0]}</b> next.`:''}`;
  }
  if(priority){
    const [name,data]=priority;
    const gap=TARGET-data.daily;
    return `Focus on <b>${name}</b> — £${data.daily.toFixed(0)}/£${TARGET} per day. Needs £${gap.toFixed(0)} more (≈${Math.ceil(gap/15)} jobs).`;
  }
  return 'All rounds building — keep canvassing!';
}

        🟡 Amber = 1-2 customers (build the street)<br>
        🔵 Blue = no customers yet (fresh territory)
      </div>
      ${streets.map(s=>`
        <div class="street-item ${s.type}" onclick="focusStreet('${esc(s.name)}',${s.lat||0},${s.lng||0})">
          <div class="si-n">${s.name}</div>
          <div class="si-s">${s.existing>0?`✅ ${s.existing} existing customer${s.existing>1?'s':''} — ${s.round||''}`:s.type==='fresh'?'🆕 No customers yet — fresh opportunity':'Street with potential'}</div>
        </div>`).join('')}
      ${!streets.length?`<div style="text-align:center;padding:14px;color:var(--text2);font-size:12px">Zoom into the map to see nearby streets, or add a job to start building this area.</div>`:''}

  </div>

  c.innerHTML=html;

  // Pan map to priority round
  if(priority){

      const lats=rJobs.map(j=>j.lat),lngs=rJobs.map(j=>j.lng);
      map.setView([(Math.max(...lats)+Math.min(...lats))/2,(Math.max(...lngs)+Math.min(...lngs))/2],13);
    } else if(map){
      map.setView(terr.centre,terr.zoom);
    }
  }
}

function getStreetSuggestions(roundName,terr){
  if(!roundName) return [];
  const rJobs=jobs.filter(j=>j.round_name===roundName);
  const byStreet={};
  rJobs.forEach(j=>{
    const st=extractStreet(j.address);
    if(!st) return;
    if(!byStreet[st]){byStreet[st]={name:st,existing:0,lat:j.lat,lng:j.lng,round:j.round_name};}
    byStreet[st].existing++;
    if(j.lat) byStreet[st].lat=j.lat;
    if(j.lng) byStreet[st].lng=j.lng;
  });
  return Object.values(byStreet)
    .sort((a,b)=>b.existing-a.existing)
    .map(s=>({...s,type:s.existing>=3?'has-cust':s.existing>=1?'partial':'fresh'}))
    .slice(0,10);
}

function extractStreet(addr){
  if(!addr) return null;
  const p=addr.split(',')[0].trim().replace(/^\d+[a-zA-Z]?\s+/,'');
  return p.length>3?p:null;
}

function focusStreet(name,lat,lng){
  const matches=jobs.filter(j=>j.address&&j.address.toLowerCase().includes(name.toLowerCase()));
  if(matches.length) toast(`${name}: ${matches.length} customer${matches.length!==1?'s':''} here`);
  if(lat&&lng&&map) map.setView([lat,lng],17);
}

function focusRound(name){
  const rj=jobs.filter(j=>j.round_name===name&&j.lat&&j.lng);
  if(!rj.length||!map) return;
  if(rj.length>1) map.fitBounds(rj.map(j=>[j.lat,j.lng]),{padding:[30,30],maxZoom:14});
  else map.setView([rj[0].lat,rj[0].lng],15);
}

function getAllRounds(){
  const fromDB=roundsList.map(r=>r.name);
  const fromData=Object.keys(ROUND_DATA);
  return[...new Set([...fromDB,...fromData])].sort();
}

function updHint(){
  const fe=document.getElementById('ff'),pe=document.getElementById('fpr'),h=document.getElementById('fh');
  if(!fe||!h) return;
  const f=fByVal(fe.value),p=parseFloat(pe?.value||0)||0;
  if(!f.vpy){h.textContent='One-off';return;}
  const vpy=Math.round(f.vpy*10)/10;
  h.textContent=p>0?`${vpy}/yr · £${(p*f.vpy/12).toFixed(2)}/mo`:`${vpy} visits/year`;
}

function onPC(){
  const pc=(document.getElementById('fp')?.value||'').trim().toUpperCase();
  const re=document.getElementById('frnd'),rh=document.getElementById('rndHint');
  if(!re||!rh) return;
  const m=pc.match(/^([A-Z]{1,2}[0-9][0-9A-Z]?)/);
  const sug=m?PC_ROUND[m[1]]:null;
  if(sug){
    re.value=sug;
    // Check if full
    const liveJobs=jobs.filter(j=>j.round_name===sug);
    const liveDaily=liveJobs.reduce((s,j)=>s+(parseFloat(j.price)||0),0);
    const stored=ROUND_DATA[sug]?.daily||0;
    const actual=liveJobs.length>0?liveDaily:stored;
    if(actual>=TARGET){
      const nn=nextNum(sug);
      rh.textContent=`⚠️ ${sug} full — consider ${sug} ${nn}`;
      rh.style.color='var(--amber)';
    } else {
      const pct=((actual/TARGET)*100).toFixed(0);
      rh.textContent=`✓ ${sug} (${pct}% full)`;
      rh.style.color='var(--green)';
    }
  } else {rh.textContent='';}
}

function chkStreet(){
  const addr=(document.getElementById('fa')?.value||'').trim();
  const el=document.getElementById('streetAlert');
  if(!el||addr.length<5) return;
  const st=addr.replace(/^\d+[a-zA-Z]?\s+/,'').toLowerCase().trim();
  if(!st) return;
  const matches=jobs.filter(j=>j.address&&j.address.toLowerCase().includes(st));
  if(matches.length>0){
    el.style.display='block';
    el.innerHTML=`👥 We already have ${matches.length} customer${matches.length>1?'s':''} on this street: `+
      matches.slice(0,3).map(j=>`<b>${j.customer_name}</b> (£${j.price})`).join(', ')+
      (matches.length>3?` +${matches.length-3} more`:'');
  } else {el.style.display='none';}
}

function getFormVals(){
  return{
    customer_name:document.getElementById('fn').value.trim(),
    address:document.getElementById('fa').value.trim(),
    postcode:document.getElementById('fp').value.trim().toUpperCase(),
    mobile:document.getElementById('fm').value.trim(),
    email:document.getElementById('fe').value.trim(),
    frequency:document.getElementById('ff').value,
    price:parseFloat(document.getElementById('fpr').value||0).toFixed(2),
    notes:document.getElementById('fno').value.trim(),
    round_name:document.getElementById('frnd')?.value||''
  };
}

async function addJob(){
  if(!canvasserName){toast('Enter your name first','err');return;}
  const v=getFormVals();
  if(!v.customer_name||!v.address||!v.postcode||parseFloat(v.price)===0){toast('Fill required fields','err');return;}
  // Warn if round will be full
  if(v.round_name){
    const lj=jobs.filter(j=>j.round_name===v.round_name);
    const ld=lj.reduce((s,j)=>s+(parseFloat(j.price)||0),0)+(parseFloat(v.price)||0);
    const stored=ROUND_DATA[v.round_name]?.daily||0;
    const actual=lj.length>0?ld:stored+(parseFloat(v.price)||0);
    if(actual>=TARGET) toast(`${v.round_name} will hit £${TARGET}/day — consider starting ${v.round_name} ${nextNum(v.round_name)}`);
  }
  const job={id:gid(),...v,date_added:todayStr,lat:null,lng:null,canvasser:canvasserName};
  jobs.unshift(job);updateStats();renderTab();
  await sb.from('jobs').upsert(job);
  geocode(job);
  toast('Job added: '+v.customer_name);
  ['fn','fa','fp','fm','fe','fpr','fno'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  updHint();
}

async function saveEdit(){
  const j=jobs.find(x=>x.id===editId);if(!j)return;
  const v=getFormVals();
  Object.assign(j,v);editId=null;
  if(markers[j.id]){map.removeLayer(markers[j.id]);delete markers[j.id];}
  await sb.from('jobs').upsert(j);
  geocode(j);updateStats();renderTab();toast('Updated');
}

function cancelEdit(){editId=null;renderTab();}

function editJob(id){
  editId=id;
  const j=jobs.find(x=>x.id===id);
  curTab='add';document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));
  renderAdd(document.getElementById('tc'),j);

async function delJob(id){
  if(!confirm('Delete this job?'))return;
  jobs=jobs.filter(j=>j.id!==id);
  if(markers[id]){map.removeLayer(markers[id]);delete markers[id];}
  await sb.from('jobs').delete().eq('id',id);
  selJob=null;updateStats();renderTab();toast('Deleted');
}

      const m=L.marker([j.lat,j.lng],{icon:ic}).addTo(map);
      m.bindPopup(`<b>${j.customer_name}</b><br>${j.address}<br>£${j.price}/visit · ${fByVal(j.frequency).label}<br><small>${j.round_name||'No round'} · Added by ${j.canvasser||'?'}</small>`);
      m.on('click',()=>{selJob=j.id;if(curTab==='list')renderTab();else{curTab='list';document.querySelectorAll('.tab')[3].click();}});
      markers[j.id]=m;
    }
  });
}

function buildLegend(){
  const el=document.getElementById('mapLegend');if(!el) return;
  const activeRounds=[...new Set(jobs.filter(j=>j.round_name).map(j=>j.round_name))].slice(0,8);
  el.innerHTML=`<div style="font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px">Rounds</div>`+
    activeRounds.map(r=>`<div class="ml-row"><div class="ml-dot" style="background:${rc(r)}"></div><span style="font-size:10px">${r}</span></div>`).join('');
}

async function geocode(job){
  try{
    const q=encodeURIComponent(job.address+', '+job.postcode+', UK');
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1`);
    const d=await r.json();
    if(d&&d.length){
      job.lat=parseFloat(d[0].lat);job.lng=parseFloat(d[0].lon);
      await sb.from('jobs').update({lat:job.lat,lng:job.lng}).eq('id',job.id);
      renderMarkers();map.setView([job.lat,job.lng],15);
    }
  }catch(e){}
}

function locateMe(){
  if(!navigator.geolocation){toast('Geolocation not available','err');return;}
  navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],15),()=>toast('Could not get location','err'));
}

function exportCSV(){
  if(!jobs.length){toast('No jobs to export','err');return;}
  const hdrs=['Name','Address','Postcode','Mobile','Email','Frequency','Visits/yr','Price (£)','Annual (£)','Monthly (£)','Round','Notes','Canvasser','Date added'];
  const rows=jobs.map(j=>{
    const f=fByVal(j.frequency);
    return [j.customer_name,j.address,j.postcode,j.mobile||'',j.email||'',
      f.label,f.vpy?Math.round(f.vpy*10)/10:0,j.price,
      annVal(j.price,j.frequency).toFixed(2),monVal(j.price,j.frequency).toFixed(2),
      j.round_name||'',j.notes||'',j.canvasser||'',j.date_added]
      .map(v=>`"${String(v||'').replace(/"/g,'""')}"`);
  });
  const csv=[hdrs.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`wcc_jobs_${todayStr}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('CSV exported!');
}

initMap();loadData();
</script>
